version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    entrypoint: >
      sh -c "
      ollama serve &
      sleep 10 &&
      ollama pull llama3.2:1b &&
      wait
      "

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always

volumes:
  ollama_data: