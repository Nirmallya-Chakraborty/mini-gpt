apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nirmallyachakraborty/mini-gpt-backend:latest
          ports:
            - containerPort: 8001
          env:
            - name: OLLAMA_BASE_URL
              value: "http://192.168.1.185:11434"